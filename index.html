<!DOCTYPE html>
<html>
<head>
    <title>Captcha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
            background: #7b5cff;
            margin: 0;
        }

        .box {
            background: white;
            width: 90%;
            max-width: 300px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .captcha {
            border: 2px solid gray;
            padding: 10px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
        }

        .text {
            letter-spacing: 4px;
            font-size: 20px;
            font-weight: bold;
        }

        input {
            padding: 10px;
            width: 100%;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            padding: 10px;
            background: #7b5cff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #5a3edb;
        }

        .refresh {
            width: auto;
            padding: 6px 10px;
            font-size: 14px;
        }

       
        @media (max-width: 400px) {
            .text {
                font-size: 18px;
            }
        }
    </style>
</head>

<body onload="generate()">

<div class="box">
    <h3>Captcha</h3>

    <div class="captcha">
        <span class="text" id="abc"></span>
        <button class="refresh" onclick="generate()">↻</button>
    </div>

    <input type="text" placeholder="Enter captcha" id="res" onclick="this.value=''">

    <button onclick="check()">Submit</button>
    <p id="result"></p>
</div>

<script>
let Captcha="";

function generate()
{
    let ch="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    Captcha="";
    for (let i=0;i<6;i++)
    {
        Captcha += ch[Math.floor(Math.random()*ch.length)];
    }

    document.getElementById("abc").innerText=Captcha;
}

function check()
{
    let user = document.getElementById("res").value;

    if(user == Captcha)
    {
        document.getElementById("result").innerText="Correct ✅";
    }
    else{
        document.getElementById("result").innerText="Incorrect ❌";
    }
}
</script>

</body>
</html>
